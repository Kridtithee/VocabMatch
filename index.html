<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocabMatch — Dark Blue Pastel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Vocab<span>Match</span></div>
    <div class="tabs">
      <button class="tab active" data-tab="game">🎮 เกมจับคู่</button>
      <button class="tab" data-tab="vocab">📘 ตารางศัพท์</button>
    </div>
    <div class="hud">
      <!-- เอา Score ออกแล้ว เหลือแค่ Streak กับ Mistakes -->
      <div class="hud-item">
        <span class="hud-label">Streak</span>
        <span class="hud-val" id="streak">🔥 0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Mistakes</span>
        <span class="hud-val" id="mistakes">0</span>
      </div>
    </div>
  </header>

  <main>
    <!-- ส่วนของเกม -->
    <section id="game-section">
      <div class="level-strip">
        <div class="level-badge" id="level-badge">LV 1</div>
        <div class="level-title" id="level-title">Academic Vocabulary</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
      </div>
      <div class="board" id="board"></div>
    </section>

    <!-- ส่วนตารางศัพท์ -->
    <section id="vocab-section" style="display: none;">
      <div class="vocab-controls">
        <input type="text" id="vocab-search" placeholder="🔍 ค้นหาคำศัพท์...">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>English</th>
              <th>ไทย</th>
              <th>Example Sentence</th>
              <th>ตัวอย่างประโยค</th>
            </tr>
          </thead>
          <tbody id="vocab-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Overlay & Toast -->
  <div class="overlay" id="overlay">
    <div class="win-box">
      <div class="win-title">🎉 CLEARED!</div>
      <div class="win-sub" id="win-sub">Level 1 Complete</div>
      <div class="win-stats">
        <!-- เหลือแค่ Mistakes -->
        <div class="win-stat">
          <div class="win-stat-n" id="wstat-mistakes">0</div>
          <div class="win-stat-l">Mistakes</div>
        </div>
      </div>
      <button class="btn" onclick="nextLevel()">NEXT LEVEL →</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="js/vocab-data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/table.js"></script>
  <script>
    // สลับแท็บและเริ่มต้น
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('game-section').style.display = tab === 'game' ? 'block' : 'none';
        document.getElementById('vocab-section').style.display = tab === 'vocab' ? 'block' : 'none';
        if (tab === 'vocab') initTableTab();
      });
    });

    window.addEventListener('DOMContentLoaded', startGame);
  </script>
</body>
</html>
